<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Mr. X játék</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: red;
  font-family: Arial;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
}

#basket {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 50px;
}

.falling {
  position: absolute;
  font-size: 30px;
}

#score, #timer {
  position: absolute;
  top: 10px;
  font-size: 20px;
}

#score { left: 10px; }
#timer { right: 10px; }

#message {
  position: absolute;
  top: 40%;
  width: 100%;
  text-align: center;
  font-size: 40px;
  display: none;
}
</style>
</head>

<body>

<div id="game">
  <div id="score">Pont: 0</div>
  <div id="timer">Idő: 60</div>
  <div id="basket">🧺</div>
  <div id="message"></div>
</div>

<script>
let score = 0;
let timeLeft = 60;
let basketX = window.innerWidth / 2;
let gameRunning = true;

const basket = document.getElementById("basket");
const scoreEl = document.getElementById("score");
const timerEl = document.getElementById("timer");
const messageEl = document.getElementById("message");

const goodItem = "🔴";
const badItems = ["💀","☠️","🧨"];

function updateBasket() {
  basket.style.left = basketX + "px";
  basket.style.transform = "translateX(-50%)";
}

// BILLENTYŰ
document.addEventListener("keydown", (e) => {
  if (!gameRunning) return;

  if (e.key === "ArrowLeft") basketX -= 40;
  if (e.key === "ArrowRight") basketX += 40;

  const basketWidth = 80;
basketX = Math.max(0, Math.min(window.innerWidth - basketWidth, basketX));
  updateBasket();
});

// MOBIL HÚZÁS
let touchStartX = 0;

document.addEventListener("touchstart", (e) => {
  touchStartX = e.touches[0].clientX;
});

document.addEventListener("touchmove", (e) => {
  if (!gameRunning) return;

  let touchX = e.touches[0].clientX;
  basketX += (touchX - touchStartX);
  touchStartX = touchX;

  const basketWidth = 150;
basketX = Math.max(0, Math.min(window.innerWidth - basketWidth, basketX));
  updateBasket();
});

// TÁRGY GENERÁLÁS
function createFalling() {
  if (!gameRunning) return;

  const item = document.createElement("div");
  item.classList.add("falling");

  let isGood = Math.random() < 0.25;

  if (isGood) {
    item.innerText = goodItem;
    item.dataset.type = "good";
  } else {
    item.innerText = badItems[Math.floor(Math.random()*badItems.length)];
    item.dataset.type = "bad";
  }

  item.style.left = Math.random() * window.innerWidth + "px";
  item.style.top = "0px";

  document.getElementById("game").appendChild(item);

  let speed = 5 + score / 40; // gyorsul ponttal

  let fall = setInterval(() => {
    let top = parseInt(item.style.top);
    item.style.top = top + speed + "px";

    let itemX = item.offsetLeft;
    let itemY = item.offsetTop;
    let basketRect = basket.getBoundingClientRect();

    if (
      itemY > window.innerHeight - 100 &&
      itemX > basketRect.left &&
      itemX < basketRect.right
    ) {
      if (item.dataset.type === "good") {
  score += 10;
} else {
  if (score > 0) {
    score -= 10;
  }
}

scoreEl.innerText = "Pont: " + score;

if (score === 0 && timeLeft < 60 && timeLeft !== 60) restartGame();
if (score >= 200) winGame();
      
      item.remove();
      clearInterval(fall);
    }

    if (itemY > window.innerHeight) {
      item.remove();
      clearInterval(fall);
    }

  }, 30);
}

// IDŐ
let timer = setInterval(() => {
  if (!gameRunning) return;

  timeLeft--;
  timerEl.innerText = "Idő: " + timeLeft;

  if (timeLeft <= 0) restartGame();

}, 1000);

// SPAWN
setInterval(createFalling, 400);

// WIN
function winGame() {
  gameRunning = false;
  messageEl.style.display = "block";
  messageEl.innerHTML = "✔ Siker!<br>Kód: <b>5471</b><br><button onclick='location.reload()'>Újra</button>";

}

// RESET
function restartGame() {
  gameRunning = false;
  messageEl.style.display = "block";
  messageEl.innerHTML = "💀 Újrakezdés<br><button onclick='location.reload()'>Újra</button>";
}
</script>

</body>
</html>
